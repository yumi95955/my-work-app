<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>내 작업 앱</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;min-height:100vh;display:flex;justify-content:center;}
.app{width:100%;max-width:390px;min-height:100vh;background:#fff;display:flex;flex-direction:column;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;display:flex;border-top:0.5px solid rgba(0,0,0,0.12);background:#fff;padding:8px 0 18px;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;color:#aaa;cursor:pointer;border:none;background:none;padding:0;}
.nav-item.active{color:#534AB7;}
.nav-item i{font-size:20px;}
.screen{display:none;flex-direction:column;flex:1;padding:16px 16px 80px;}
.screen.active{display:flex;}
.screen-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.screen-title{font-size:20px;font-weight:500;color:#111;}
.btn-add{background:none;border:none;cursor:pointer;color:#666;padding:4px;}
.btn-add i{font-size:22px;}
.inner-tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;}
.inner-tabs::-webkit-scrollbar{display:none;}
.itab{font-size:12px;padding:5px 14px;border-radius:20px;border:0.5px solid rgba(0,0,0,0.2);color:#666;cursor:pointer;white-space:nowrap;background:none;}
.itab.active{background:#534AB7;color:#fff;border-color:#534AB7;}
.todo-list{display:flex;flex-direction:column;}
.todo-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,0.08);font-size:14px;color:#111;}
.todo-item:last-child{border-bottom:none;}
.check-btn{width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.2);flex-shrink:0;cursor:pointer;background:none;display:flex;align-items:center;justify-content:center;}
.check-btn.done{background:#1D9E75;border-color:#1D9E75;}
.check-btn.done::after{content:'';width:5px;height:9px;border:1.5px solid #fff;border-left:none;border-top:none;transform:rotate(45deg) translateY(-1px);}
.todo-text{flex:1;}
.todo-text.done{text-decoration:line-through;color:#bbb;}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;flex-shrink:0;}
.tag-daily{background:#E6F1FB;color:#185FA5;}
.tag-weekly{background:#E1F5EE;color:#0F6E56;}
.tag-todo{background:#EEEDFE;color:#534AB7;}
.tag-hold{background:#FAEEDA;color:#854F0B;}
.tag-done{background:#EAF3DE;color:#3B6D11;}
.tag-unpaid{background:#FCEBEB;color:#A32D2D;}
.tag-urgent{background:#FCEBEB;color:#A32D2D;}
.tag-paid{background:#EAF3DE;color:#3B6D11;}
.tag-wip{background:#FAEEDA;color:#854F0B;}
.empty{text-align:center;color:#bbb;font-size:13px;padding:32px 0;}
.section-label{font-size:11px;font-weight:500;color:#888;letter-spacing:0.04em;margin:12px 0 6px;}
.summary-card{border-radius:10px;padding:13px 14px;margin-bottom:16px;border:0.5px solid;}
.summary-card.green{background:#E1F5EE;border-color:#9FE1CB;}
.summary-card.purple{background:#EEEDFE;border-color:#CECBF6;}
.summary-top{font-size:11px;font-weight:500;margin-bottom:10px;}
.summary-top.green{color:#085041;}
.summary-top.purple{color:#3C3489;}
.summary-nums{display:flex;gap:20px;}
.snum{display:flex;flex-direction:column;gap:2px;}
.snum-label{font-size:10px;color:#888;}
.snum-value{font-size:17px;font-weight:500;}
.snum-value.green{color:#1D9E75;}
.snum-value.amber{color:#BA7517;}
.snum-value.purple{color:#534AB7;}
.divider{height:0.5px;background:rgba(0,0,0,0.08);margin:10px 0 12px;}
.client-group{margin-bottom:4px;}
.client-name{font-size:11px;font-weight:500;color:#888;margin-bottom:6px;letter-spacing:0.03em;}
.ms-item{padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,0.08);}
.ms-item:last-child{border-bottom:none;}
.ms-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.ms-title{font-size:13px;font-weight:500;color:#111;flex:1;margin-right:8px;}
.ms-sub{font-size:11px;color:#888;}
.cal-nav-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.cal-date-label{font-size:15px;font-weight:500;color:#111;}
.cal-btns{display:flex;gap:16px;}
.cal-btn{background:none;border:none;cursor:pointer;color:#666;}
.cal-btn i{font-size:18px;}
.free-bar{background:#f5f5f3;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.free-label{font-size:12px;color:#888;}
.free-value{font-size:14px;font-weight:500;color:#111;}
.legend{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#888;}
.leg-dot{width:8px;height:8px;border-radius:2px;}
.timeline-wrap{display:flex;overflow-y:auto;max-height:500px;}
.time-col{width:38px;flex-shrink:0;display:flex;flex-direction:column;}
.time-slot-label{height:80px;font-size:10px;color:#bbb;text-align:right;padding-right:8px;padding-top:4px;}
.blocks-col{width:100%;display:flex;flex-direction:column;border-left:0.5px solid rgba(0,0,0,0.1);}
.hour-slot{height:80px;border-bottom:0.5px solid rgba(0,0,0,0.07);}
.hour-slot:last-child{border-bottom:none;}
.blocks-layer{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;}
.blocks-layer .tblock{pointer-events:all;}
.tblock{position:absolute;left:4px;right:4px;border-radius:6px;padding:4px 8px;overflow:hidden;cursor:pointer;}
.tblock-title{font-size:11px;font-weight:500;line-height:1.3;}
.tblock-sub{font-size:10px;margin-top:1px;opacity:0.8;}
.tblock.freelance{background:#EEEDFE;border-left:2.5px solid #534AB7;}
.tblock.freelance .tblock-title{color:#3C3489;}
.tblock.freelance .tblock-sub{color:#534AB7;}
.tblock.yiyu{background:#E1F5EE;border-left:2.5px solid #1D9E75;}
.tblock.yiyu .tblock-title{color:#085041;}
.tblock.yiyu .tblock-sub{color:#0F6E56;}
.tblock.personal{background:#FAEEDA;border-left:2.5px solid #BA7517;}
.tblock.personal .tblock-title{color:#633806;}
.tblock.personal .tblock-sub{color:#854F0B;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:18px 18px 0 0;padding:20px 20px 36px;width:100%;max-width:390px;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:500;color:#111;margin-bottom:16px;}
.modal input,.modal select{width:100%;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;color:#111;background:#fff;margin-bottom:12px;outline:none;}
.modal-label{font-size:12px;color:#888;margin-bottom:6px;}
.status-pills{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.spill{font-size:12px;padding:5px 14px;border-radius:20px;border:0.5px solid rgba(0,0,0,0.2);cursor:pointer;background:none;color:#888;}
.spill.sel-todo{background:#EEEDFE;color:#534AB7;border-color:#534AB7;}
.spill.sel-hold{background:#FAEEDA;color:#854F0B;border-color:#854F0B;}
.spill.sel-done{background:#EAF3DE;color:#3B6D11;border-color:#3B6D11;}
.modal-btns{display:flex;gap:10px;margin-top:4px;}
.btn-cancel{flex:1;padding:11px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:none;font-size:14px;cursor:pointer;color:#888;}
.btn-save{flex:2;padding:11px;border:none;border-radius:8px;background:#534AB7;color:#fff;font-size:14px;font-weight:500;cursor:pointer;}
.delete-btn{background:none;border:none;cursor:pointer;color:#bbb;margin-left:auto;padding:2px;}
.delete-btn i{font-size:16px;}
.add-time-btn{width:100%;padding:10px;border:none;border-radius:8px;background:#534AB7;color:#fff;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:12px;}
.todo-pick-section{margin-bottom:14px;}
.todo-pick-label{font-size:11px;font-weight:500;color:#888;margin-bottom:8px;letter-spacing:0.04em;}
.todo-pick-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;margin-bottom:6px;cursor:pointer;}
.todo-pick-item.selected{background:#EEEDFE;border-color:#534AB7;}
.todo-pick-text{font-size:13px;color:#111;flex:1;}
.todo-pick-check{width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.15);flex-shrink:0;}
.todo-pick-item.selected .todo-pick-check{background:#534AB7;border-color:#534AB7;}
.or-divider{display:flex;align-items:center;gap:8px;margin:12px 0;color:#bbb;font-size:12px;}
.or-divider::before,.or-divider::after{content:'';flex:1;height:0.5px;background:rgba(0,0,0,0.1);}
.time-row{display:flex;gap:10px;margin-bottom:12px;}
.time-row>div{flex:1;}
.loading{text-align:center;color:#bbb;font-size:13px;padding:20px 0;}
</style>
</head>
<body>
<div class="app">
  <div class="screen active" id="screen-todo">
    <div class="screen-header">
      <span class="screen-title">할 일</span>
      <button class="btn-add" onclick="openTodoModal()"><i class="ti ti-plus"></i></button>
    </div>
    <div class="inner-tabs">
      <button class="itab active" onclick="switchTodoTab('today',this)">오늘</button>
      <button class="itab" onclick="switchTodoTab('month',this)">이번 달</button>
      <button class="itab" onclick="switchTodoTab('routine',this)">루틴</button>
    </div>
    <div class="todo-list" id="todo-list"><p class="loading">불러오는 중...</p></div>
  </div>
  <div class="screen" id="screen-yiyu">
    <div class="screen-header">
      <span class="screen-title">이유</span>
      <button class="btn-add" onclick="openYiyuModal()"><i class="ti ti-plus"></i></button>
    </div>
    <div class="summary-card purple">
      <p class="summary-top purple">이번 달 고정 수입</p>
      <div class="summary-nums">
        <div class="snum"><span class="snum-label">월 급여</span><span class="snum-value purple">1,643,900원</span></div>
      </div>
    </div>
    <div id="yiyu-tasks-view">
      <p class="section-label">진행 중 / 보류</p>
      <div class="todo-list" id="yiyu-active-list"></div>
      <div class="divider"></div>
      <p class="section-label">완료</p>
      <div class="todo-list" id="yiyu-done-list"></div>
    </div>
  </div>
  <div class="screen" id="screen-ms">
    <div class="screen-header">
      <span class="screen-title">원고</span>
      <button class="btn-add" onclick="openMsModal()"><i class="ti ti-plus"></i></button>
    </div>
    <div class="summary-card green">
      <p class="summary-top green">이번 달 프리랜서 수입</p>
      <div class="summary-nums">
        <div class="snum"><span class="snum-label">확정</span><span class="snum-value green" id="ms-confirmed">0원</span></div>
        <div class="snum"><span class="snum-label">미수금</span><span class="snum-value amber" id="ms-unpaid">0원</span></div>
      </div>
    </div>
    <div id="ms-list"><p class="loading">불러오는 중...</p></div>
  </div>
  <div class="screen" id="screen-time">
    <div class="cal-nav-row">
      <span class="cal-date-label" id="time-date-label"></span>
      <div class="cal-btns">
        <button class="cal-btn" onclick="changeDay(-1)"><i class="ti ti-chevron-left"></i></button>
        <button class="cal-btn" onclick="changeDay(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>
    <div class="free-bar">
      <span class="free-label">빈 시간</span>
      <span class="free-value" id="free-time-val">-</span>
    </div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#534AB7;"></div>프리랜서</div>
      <div class="leg-item"><div class="leg-dot" style="background:#1D9E75;"></div>이유</div>
      <div class="leg-item"><div class="leg-dot" style="background:#BA7517;"></div>개인</div>
    </div>
    <button class="add-time-btn" onclick="openTimeModal()">+ 일정 추가</button>
    <div class="timeline-wrap">
      <div class="time-col" id="time-labels"></div>
      <div style="flex:1;position:relative;">
        <div class="blocks-col" id="hours-col"></div>
        <div class="blocks-layer" id="blocks-col"></div>
      </div>
    </div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('todo',this)"><i class="ti ti-checkbox"></i><span>할 일</span></button>
    <button class="nav-item" onclick="switchTab('yiyu',this)"><i class="ti ti-building"></i><span>이유</span></button>
    <button class="nav-item" onclick="switchTab('ms',this)"><i class="ti ti-file-text"></i><span>원고</span></button>
    <button class="nav-item" onclick="switchTab('time',this)"><i class="ti ti-calendar"></i><span>타임트래커</span></button>
  </nav>
</div>
<div class="modal-bg" id="modal-todo">
  <div class="modal">
    <p class="modal-title">할 일 추가</p>
    <input type="text" id="todo-input" placeholder="할 일 입력...">
    <p class="modal-label">종류</p>
    <div class="status-pills" id="todo-type-pills">

    <p class="modal-label">루틴 등록</p>
    <div class="status-pills">
      <button class="spill sel-todo" id="routine-none" onclick="selectRoutine('none')">없음</button>
      <button class="spill" id="routine-daily" onclick="selectRoutine('daily')">매일</button>
      <button class="spill" id="routine-weekly" onclick="selectRoutine('weekly')">매주</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
      <button id="urgent-btn" class="spill" onclick="toggleUrgent()" style="margin:0;">🔥 급구</button>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-todo')">취소</button>
      <button class="btn-save" onclick="saveTodo()">저장</button>

</div>
<div class="modal-bg" id="modal-yiyu">
  <div class="modal">
    <p class="modal-title">이유 할 일 추가</p>
    <input type="text" id="yiyu-input" placeholder="업무 내용 입력...">
    <p class="modal-label">상태</p>
    <div class="status-pills" id="yiyu-status-pills">
      <button class="spill sel-todo" onclick="selectYiyuStatus('todo',this)">진행중</button>
      <button class="spill" onclick="selectYiyuStatus('hold',this)">보류</button>
      <button class="spill" onclick="selectYiyuStatus('done',this)">완료</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
      <button id="yiyu-urgent-btn" class="spill" onclick="toggleYiyuUrgent()" style="margin:0;">🔥 급구</button>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-yiyu')">취소</button>
      <button class="btn-save" onclick="saveYiyu()">저장</button>
    </div>

</div>
<div class="modal-bg" id="modal-ms">
  <div class="modal">
    <p class="modal-title">원고 추가</p>
    <input type="text" id="ms-title-input" placeholder="원고 제목">
    <p class="modal-label">클라이언트</p>
    <select id="ms-client-input">
      <option value="">선택해주세요</option>
      <option value="제이와이">제이와이</option>
      <option value="그루">그루</option>
      <option value="다퍼컴퍼니">다퍼컴퍼니</option>
    </select>
    <div style="display:flex;gap:10px;">
      <input type="number" id="ms-price-input" placeholder="건당 금액 (원)" oninput="updateDeducted()" style="flex:2;margin-bottom:12px;">
      <input type="number" id="ms-count-input" placeholder="건수" min="1" oninput="updateDeducted()" style="flex:1;margin-bottom:12px;">
    </div>

    <input type="date" id="ms-deadline-input">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <button id="deduct-btn" class="spill" onclick="toggleDeduct()" style="margin:0;">3.3% 공제</button>
      <span id="deducted-preview" style="font-size:12px;color:#534AB7;display:none;"></span>
    </div>
    <p class="modal-label">상태</p>
    <div class="status-pills" id="ms-status-pills">
      <button class="spill sel-todo" onclick="selectMsStatus('wip',this)">작성중</button>
      <button class="spill" onclick="selectMsStatus('done',this)">납품완료</button>
      <button class="spill" onclick="selectMsStatus('unpaid',this)">미수금</button>

</div>
<div class="modal-bg" id="modal-time">
  <div class="modal">
    <p class="modal-title">일정 추가</p>
    <div class="todo-pick-section">
      <p class="todo-pick-label">할 일에서 가져오기</p>
      <div id="todo-pick-list"></div>
    </div>
    <div class="or-divider">또는 직접 입력</div>
    <input type="text" id="time-title-input" placeholder="일정 이름 직접 입력">
    <div class="time-row">
      <div><p class="modal-label">시작</p><input type="time" id="time-start" value="09:00"></div>
      <div><p class="modal-label">종료</p><input type="time" id="time-end" value="10:00"></div>
    </div>
    <p class="modal-label">종류</p>
    <div class="status-pills" id="time-type-pills">
      <button class="spill sel-todo" onclick="selectTimeType('freelance',this)">프리랜서</button>
      <button class="spill" onclick="selectTimeType('yiyu',this)">이유</button>
      <button class="spill" onclick="selectTimeType('personal',this)">개인</button>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-time')">취소</button>
      <button class="btn-save" onclick="saveTimeBlock()">저장</button>
    </div>
  </div>
</div>
<script>
const SUPABASE_URL='https://kkbynicqfziledbvgnei.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrYnluaWNxZnppbGVkYnZnbmVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMTQzMzAsImV4cCI6MjA5Njg5MDMzMH0.DsNmtg3zJ9OJmh4RwUZoBVTaz1tWnJJLMyu4s9WyKyk';
const H={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};

async function db(table,method='GET',body=null,query=''){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`,{method,headers:{...H,'Prefer':method==='POST'?'return=representation':''},body:body?JSON.stringify(body):null});
    if(!r.ok){console.error('DB error',table,method,await r.text());return null;}
    if(method==='DELETE')return true;
    const t=await r.text();
    return t?JSON.parse(t):null;
  }catch(e){console.error('DB fetch failed',e);return null;}
}

const HOUR_H=80,START_HOUR=9,END_HOUR=22;
let state={todos:[],yiyuTasks:[],manuscripts:[],timeBlocks:[],currentDay:new Date().toISOString().slice(0,10),todoTab:'today',yiyuTab:'tasks',todoType:'today',yiyuStatus:'todo',msStatus:'wip',timeType:'freelance',routine:'none',pickedTodo:null,msDeduct:false};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmt(n){return n.toLocaleString('ko-KR')+'원';}

function switchTab(tab,el){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  el.classList.add('active');
  if(tab==='todo')loadAndRenderTodos();
  if(tab==='yiyu')loadAndRenderYiyu();
  if(tab==='ms')loadAndRenderMs();
  if(tab==='time')loadAndRenderTime();
}

// 할 일
async function loadAndRenderTodos(){
  const data=await db('todos','GET',null,'?order=created_at.asc');
  if(data)state.todos=data.map(t=>({id:t.id,text:t.text,type:t.type,routine:t.routine,done:t.done,urgent:t.urgent}));
  renderTodos();
}
function switchTodoTab(tab,el){state.todoTab=tab;document.querySelectorAll('#screen-todo .itab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderTodos();}
function renderTodos(){
  const list=document.getElementById('todo-list');
  let items=[];
  if(state.todoTab==='today'){items=state.todos.filter(t=>t.type==='today'||t.routine==='daily'||t.routine==='weekly');}
  else if(state.todoTab==='month'){items=state.todos.filter(t=>t.type==='month');}
  else{items=state.todos.filter(t=>t.routine&&t.routine!=='none');}
  items=[...items].sort((a,b)=>(b.urgent?1:0)-(a.urgent?1:0));
  if(!items.length){list.innerHTML='<p class="empty">+ 버튼으로 추가해보세요</p>';return;}
  list.innerHTML=items.map(t=>`<div class="todo-item">
    <button class="check-btn ${t.done?'done':''}" onclick="toggleTodo('${t.id}',${t.done})"></button>
    <span class="todo-text ${t.done?'done':''}" onclick="editTodoText('${t.id}','${(t.text||'').replace(/'/g,"\\'")}')">${t.text}</span>
    ${t.routine==='daily'?'<span class="tag tag-daily">매일</span>':''}
    ${t.routine==='weekly'?'<span class="tag tag-weekly">매주</span>':''}
    <span class="tag ${t.urgent?'tag-urgent':t.done?'tag-done':'tag-todo'}" style="cursor:pointer;" onclick="cycleTodoUrgent('${t.id}',${!!t.urgent},${!!t.done})">${t.urgent?'🔥 급구':t.done?'완료':'진행중'}</span>
    <button class="delete-btn" onclick="deleteTodo('${t.id}')"><i class="ti ti-x"></i></button>
  </div>`).join('');
}
async function cycleTodoUrgent(id,curUrgent,done){
  if(done)return;
  await db('todos','PATCH',{urgent:!curUrgent},`?id=eq.${id}`);
  loadAndRenderTodos();
}
async function editTodoText(id,oldText){
  const newText=prompt('할 일 수정',oldText);
  if(newText===null||!newText.trim()||newText===oldText)return;
  await db('todos','PATCH',{text:newText.trim()},`?id=eq.${id}`);
  loadAndRenderTodos();
}
function openTodoModal(){state.todoType='today';state.routine='none';state.urgent=false;document.getElementById('todo-input').value='';document.getElementById('urgent-btn').classList.remove('sel-hold');updateTodoTypePills();updateRoutinePills();document.getElementById('modal-todo').classList.add('open');}
function toggleUrgent(){state.urgent=!state.urgent;const btn=document.getElementById('urgent-btn');state.urgent?btn.classList.add('sel-hold'):btn.classList.remove('sel-hold');}
function selectTodoType(type){state.todoType=type;updateTodoTypePills();}
function updateTodoTypePills(){document.querySelectorAll('#todo-type-pills .spill').forEach(p=>{p.classList.remove('sel-todo');if((p.textContent==='오늘'&&state.todoType==='today')||(p.textContent==='이번 달'&&state.todoType==='month'))p.classList.add('sel-todo');});}
function selectRoutine(r){state.routine=r;updateRoutinePills();}
function updateRoutinePills(){['none','daily','weekly'].forEach(r=>{const el=document.getElementById('routine-'+r);el.classList.remove('sel-todo');if(state.routine===r)el.classList.add('sel-todo');});}
async function saveTodo(){
  const text=document.getElementById('todo-input').value.trim();
  if(!text)return;
  const item={id:uid(),text,type:state.todoType,routine:state.routine,done:false,urgent:state.urgent};
  await db('todos','POST',item);
  closeModal('modal-todo');
  loadAndRenderTodos();
}
async function toggleTodo(id,done){
  await db('todos','PATCH',{done:!done},`?id=eq.${id}`);
  loadAndRenderTodos();
}
async function deleteTodo(id){
  await db('todos','DELETE',null,`?id=eq.${id}`);
  loadAndRenderTodos();
}

// 이유
async function loadAndRenderYiyu(){
  const data=await db('yiyu_tasks','GET',null,'?order=created_at.asc');
  if(data)state.yiyuTasks=data.map(t=>({id:t.id,text:t.text,status:t.status,urgent:t.urgent,createdAt:t.created_at}));
  renderYiyu();
}
function switchYiyuTab(tab,el){state.yiyuTab=tab;document.querySelectorAll('#screen-yiyu .itab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.getElementById('yiyu-tasks-view').style.display=tab==='tasks'?'':'none';document.getElementById('yiyu-monthly-view').style.display=tab==='monthly'?'':'none';renderYiyu();}
function renderYiyu(){
  const active=document.getElementById('yiyu-active-list');
  const done=document.getElementById('yiyu-done-list');
  let activeItems=state.yiyuTasks.filter(t=>t.status!=='done');
  activeItems=[...activeItems].sort((a,b)=>(b.urgent?1:0)-(a.urgent?1:0));
  const doneItems=state.yiyuTasks.filter(t=>t.status==='done');
  active.innerHTML=activeItems.length?activeItems.map(t=>`<div class="todo-item">
    <button class="check-btn" onclick="toggleYiyu('${t.id}')"></button>
    <span class="todo-text">${t.text}</span>
    <span class="tag ${yiyuTagClass(t)}" style="cursor:pointer;" onclick="cycleYiyuStatus('${t.id}','${t.status}',${!!t.urgent})">${yiyuTagLabel(t)}</span>
    <button class="delete-btn" onclick="deleteYiyu('${t.id}')"><i class="ti ti-x"></i></button>
  </div>`).join(''):'<p class="empty">진행 중인 업무가 없어요</p>';
  done.innerHTML=doneItems.length?doneItems.map(t=>`<div class="todo-item">
    <button class="check-btn done" onclick="toggleYiyu('${t.id}')"></button>
    <span class="todo-text done">${t.text}</span>
    <span class="tag tag-done">완료</span>
    <button class="delete-btn" onclick="deleteYiyu('${t.id}')"><i class="ti ti-x"></i></button>
  </div>`).join(''):'<p class="empty">완료된 업무가 없어요</p>';
  if(state.yiyuTab==='monthly')renderYiyuMonthly();
}
function yiyuTagLabel(t){if(t.urgent)return'🔥 급구';return t.status==='hold'?'보류':'진행중';}
function yiyuTagClass(t){if(t.urgent)return'tag-urgent';if(t.status==='hold')return'tag-hold';return'tag-todo';}
async function cycleYiyuStatus(id,curStatus,curUrgent){
  // 순서: 진행중(urgent=false,status=todo) -> 보류(urgent=false,status=hold) -> 급구(urgent=true,status=todo) -> 다시 진행중
  let nextStatus,nextUrgent;
  if(!curUrgent&&curStatus==='todo'){nextStatus='hold';nextUrgent=false;}
  else if(!curUrgent&&curStatus==='hold'){nextStatus='todo';nextUrgent=true;}
  else{nextStatus='todo';nextUrgent=false;}
  await db('yiyu_tasks','PATCH',{status:nextStatus,urgent:nextUrgent},`?id=eq.${id}`);
  loadAndRenderYiyu();
}
function renderYiyuMonthly(){
  const container=document.getElementById('yiyu-monthly-list');
  const byMonth={};
  state.yiyuTasks.filter(t=>t.status==='done').forEach(t=>{const m=(t.createdAt||'').slice(0,7);if(!byMonth[m])byMonth[m]=[];byMonth[m].push(t);});
  const months=Object.keys(byMonth).sort().reverse();
  if(!months.length){container.innerHTML='<p class="empty">완료된 업무가 없어요</p>';return;}
  container.innerHTML=months.map(m=>`<div style="background:#f5f5f3;border-radius:10px;padding:12px 14px;margin-bottom:10px;">
    <p style="font-size:11px;font-weight:500;color:#888;margin-bottom:8px;">${m.replace('-','년 ')}월</p>
    ${byMonth[m].map(t=>`<div style="font-size:12px;color:#111;padding:3px 0;display:flex;gap:6px;"><span style="color:#bbb;">•</span>${t.text}</div>`).join('')}
  </div>`).join('');
}
function openYiyuModal(){
  state.yiyuStatus='todo';
  state.yiyuUrgent=false;
  document.getElementById('yiyu-input').value='';
  document.getElementById('yiyu-urgent-btn').classList.remove('sel-hold');
  document.querySelectorAll('#yiyu-status-pills .spill').forEach(p=>p.classList.remove('sel-todo','sel-hold','sel-done'));
  document.querySelector('#yiyu-status-pills .spill').classList.add('sel-todo');
  document.getElementById('modal-yiyu').classList.add('open');
}
function selectYiyuStatus(s,el){
  state.yiyuStatus=s;
  document.querySelectorAll('#yiyu-status-pills .spill').forEach(p=>p.classList.remove('sel-todo','sel-hold','sel-done'));
  if(s==='todo')el.classList.add('sel-todo');
  else if(s==='hold')el.classList.add('sel-hold');
  else el.classList.add('sel-done');
}
function toggleYiyuUrgent(){
  state.yiyuUrgent=!state.yiyuUrgent;
  const btn=document.getElementById('yiyu-urgent-btn');
  state.yiyuUrgent?btn.classList.add('sel-hold'):btn.classList.remove('sel-hold');
}
async function saveYiyu(){
  const text=document.getElementById('yiyu-input').value.trim();
  if(!text)return;
  const result=await db('yiyu_tasks','POST',{id:uid(),text,status:state.yiyuStatus,urgent:state.yiyuUrgent});
  if(!result){alert('저장에 실패했어요');return;}
  closeModal('modal-yiyu');
  loadAndRenderYiyu();
}
async function toggleYiyu(id){
  const t=state.yiyuTasks.find(x=>x.id===id);
  if(t){await db('yiyu_tasks','PATCH',{status:t.status==='done'?'todo':'done'},`?id=eq.${id}`);loadAndRenderYiyu();}
}
async function deleteYiyu(id){
  await db('yiyu_tasks','DELETE',null,`?id=eq.${id}`);
  loadAndRenderYiyu();
}

// 원고
async function loadAndRenderMs(){
  const data=await db('manuscripts','GET',null,'?order=created_at.asc');
  if(data)state.manuscripts=data.map(m=>({id:m.id,title:m.title,client:m.client,price:m.price,rawPrice:m.raw_price,count:m.count,deadline:m.deadline,deducted:m.deducted,status:m.status,createdAt:m.created_at}));
  renderMs();
}
function renderMs(){
  const list=document.getElementById('ms-list');
  const thisMonth=new Date().toISOString().slice(0,7);
  const msThisMonth=state.manuscripts.filter(m=>(m.createdAt||'').slice(0,7)===thisMonth);
  const confirmed=msThisMonth.filter(m=>m.status==='paid'||m.status==='done').reduce((s,m)=>s+(m.price||0),0);
  const unpaid=msThisMonth.filter(m=>m.status==='unpaid').reduce((s,m)=>s+(m.price||0),0);
  document.getElementById('ms-confirmed').textContent=fmt(confirmed);
  document.getElementById('ms-unpaid').textContent=fmt(unpaid);
  if(!state.manuscripts.length){list.innerHTML='<p class="empty">+ 버튼으로 원고를 추가해보세요</p>';return;}
  const byClient={};
  state.manuscripts.forEach(m=>{if(!byClient[m.client])byClient[m.client]=[];byClient[m.client].push(m);});
  list.innerHTML=Object.entries(byClient).map(([client,items])=>`
    <div class="client-group"><p class="client-name">${client}</p>
    ${items.map(m=>`<div class="ms-item">
      <div class="ms-row1"><span class="ms-title">${m.title}</span><span class="tag tag-${m.status}">${statusLabel(m.status)}</span></div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <span class="ms-sub">${(m.createdAt||'').slice(0,10)}${m.deducted?' · 3.3%공제':''}${m.count>1?' · '+m.count+'건':''}</span>
          ${m.deadline?`<br><span class="ms-sub" style="color:${new Date(m.deadline)<new Date()?'#A32D2D':'#888'};">납기 ${m.deadline}</span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="ms-sub" style="font-weight:500;">${fmt(m.price||0)}</span>
          <button class="delete-btn" onclick="deleteMs('${m.id}')"><i class="ti ti-x"></i></button>
        </div>
      </div>
    </div>`).join('')}</div><div class="divider"></div>`).join('');
}
function statusLabel(s){return{wip:'작성중',done:'납품완료',unpaid:'미수금',paid:'정산완료'}[s]||s;}
function openMsModal(){state.msStatus='wip';state.msDeduct=false;document.getElementById('ms-title-input').value='';document.getElementById('ms-client-input').value='';document.getElementById('ms-price-input').value='';document.getElementById('ms-count-input').value='';document.getElementById('ms-deadline-input').value='';document.getElementById('deduct-btn').classList.remove('sel-done');document.getElementById('deducted-preview').style.display='none';document.querySelectorAll('#ms-status-pills .spill').forEach((p,i)=>{p.classList.remove('sel-todo','sel-hold','sel-done');if(i===0)p.classList.add('sel-todo');});document.getElementById('modal-ms').classList.add('open');}
function toggleDeduct(){state.msDeduct=!state.msDeduct;const btn=document.getElementById('deduct-btn');state.msDeduct?btn.classList.add('sel-done'):btn.classList.remove('sel-done');updateDeducted();}
function updateDeducted(){const price=parseInt(document.getElementById('ms-price-input').value)||0;const count=parseInt(document.getElementById('ms-count-input').value)||1;const total=price*count;const preview=document.getElementById('deducted-preview');if(state.msDeduct&&total>0){const net=Math.round(total*0.967);preview.textContent=`→ 실수령 ${net.toLocaleString('ko-KR')}원 (${count}건)`;preview.style.display='';}else if(!state.msDeduct&&total>0&&count>1){preview.textContent=`→ 합계 ${total.toLocaleString('ko-KR')}원 (${count}건)`;preview.style.display='';}else{preview.style.display='none';}}
function selectMsStatus(s,el){state.msStatus=s;document.querySelectorAll('#ms-status-pills .spill').forEach(p=>p.classList.remove('sel-todo','sel-hold','sel-done'));el.classList.add(s==='wip'?'sel-todo':s==='unpaid'?'sel-hold':'sel-done');}
async function saveMs(){
  const title=document.getElementById('ms-title-input').value.trim();
  const client=document.getElementById('ms-client-input').value.trim();
  const rawPrice=parseInt(document.getElementById('ms-price-input').value)||0;
  const count=parseInt(document.getElementById('ms-count-input').value)||1;
  const deadline=document.getElementById('ms-deadline-input').value;
  const totalRaw=rawPrice*count;
  const price=state.msDeduct?Math.round(totalRaw*0.967):totalRaw;
  if(!title||!client)return;
  await db('manuscripts','POST',{id:uid(),title,client,price,raw_price:rawPrice,count,deadline:deadline||null,deducted:state.msDeduct,status:state.msStatus});
  closeModal('modal-ms');
  loadAndRenderMs();
}
async function deleteMs(id){
  await db('manuscripts','DELETE',null,`?id=eq.${id}`);
  loadAndRenderMs();
}

// 타임트래커
async function loadAndRenderTime(){
  const data=await db('time_blocks','GET',null,`?day=eq.${state.currentDay}&order=start_time.asc`);
  if(data)state.timeBlocks=data.map(b=>({id:b.id,title:b.title,start:b.start_time,end:b.end_time,type:b.type}));
  renderTime();
}
function changeDay(d){const dt=new Date(state.currentDay);dt.setDate(dt.getDate()+d);state.currentDay=dt.toISOString().slice(0,10);loadAndRenderTime();}
function renderTime(){
  const days=['일','월','화','수','목','금','토'];
  const dt=new Date(state.currentDay);
  document.getElementById('time-date-label').textContent=`${dt.getMonth()+1}월 ${dt.getDate()}일 ${days[dt.getDay()]}`;
  const labelsEl=document.getElementById('time-labels');
  const hoursEl=document.getElementById('hours-col');
  const blocksEl=document.getElementById('blocks-col');
  labelsEl.innerHTML='';hoursEl.innerHTML='';blocksEl.innerHTML='';
  for(let h=START_HOUR;h<=END_HOUR;h++){
    const lbl=document.createElement('div');lbl.className='time-slot-label';
    lbl.textContent=h<12?h+'am':h===12?'12pm':(h-12)+'pm';labelsEl.appendChild(lbl);
    const slot=document.createElement('div');slot.className='hour-slot';hoursEl.appendChild(slot);
  }
  let usedMins=0;
  (state.timeBlocks||[]).forEach(b=>{
    const[sh,sm]=b.start.split(':').map(Number);
    const[eh,em]=b.end.split(':').map(Number);
    const startMins=(sh-START_HOUR)*60+sm;
    const durMins=(eh*60+em)-(sh*60+sm);
    if(durMins<=0)return;
    usedMins+=durMins;
    const top=(startMins/60)*HOUR_H+2;
    const height=(durMins/60)*HOUR_H-4;
    const blk=document.createElement('div');
    blk.className=`tblock ${b.type}`;
    blk.style.cssText=`top:${top}px;height:${Math.max(height,20)}px;`;
    blk.innerHTML=`<div class="tblock-title">${b.title}</div><div class="tblock-sub">${b.start} – ${b.end}</div>`;
    blk.onclick=()=>deleteTimeBlock(b.id);
    blocksEl.appendChild(blk);
  });
  const totalMins=(END_HOUR-START_HOUR)*60;
  const freeMins=Math.max(0,totalMins-usedMins);
  const fh=Math.floor(freeMins/60),fm=freeMins%60;
  document.getElementById('free-time-val').textContent=fh>0?`약 ${fh}시간${fm>0?' '+fm+'분':''}`:`약 ${fm}분`;
}
function openTimeModal(){
  state.timeType='freelance';state.pickedTodo=null;
  document.getElementById('time-title-input').value='';
  document.getElementById('time-start').value='09:00';
  document.getElementById('time-end').value='10:00';
  document.querySelectorAll('#time-type-pills .spill').forEach((p,i)=>{p.classList.remove('sel-todo','sel-hold','sel-done');if(i===0)p.classList.add('sel-todo');});
  const pickList=document.getElementById('todo-pick-list');
  const allTodos=[
    ...state.todos.filter(t=>!t.done).map(t=>({id:t.id,text:t.text,src:'todo'})),
    ...state.yiyuTasks.filter(t=>t.status!=='done').map(t=>({id:t.id,text:t.text,src:'yiyu'}))
  ];
  pickList.innerHTML=allTodos.length?allTodos.map(t=>`
    <div class="todo-pick-item" id="pick-${t.id}" onclick="pickTodo('${t.id}','${t.text.replace(/'/g,"\\'")}','${t.src}')">
      <span class="todo-pick-text">${t.text}</span>
      <span style="font-size:10px;color:#aaa;margin-right:8px;">${t.src==='yiyu'?'이유':'할일'}</span>
      <div class="todo-pick-check"></div>
    </div>`).join(''):'<p style="font-size:12px;color:#bbb;padding:8px 0 4px;">등록된 할 일이 없어요</p>';
  document.getElementById('modal-time').classList.add('open');
}
function pickTodo(id,text,src){
  if(state.pickedTodo===id){state.pickedTodo=null;document.getElementById('time-title-input').value='';document.querySelectorAll('.todo-pick-item').forEach(el=>el.classList.remove('selected'));return;}
  state.pickedTodo=id;
  document.getElementById('time-title-input').value=text;
  document.querySelectorAll('.todo-pick-item').forEach(el=>el.classList.remove('selected'));
  document.getElementById('pick-'+id).classList.add('selected');
  if(src==='yiyu'){selectTimeType('yiyu',document.querySelectorAll('#time-type-pills .spill')[1]);}
  else{selectTimeType('freelance',document.querySelectorAll('#time-type-pills .spill')[0]);}
}
function selectTimeType(t,el){state.timeType=t;document.querySelectorAll('#time-type-pills .spill').forEach(p=>p.classList.remove('sel-todo','sel-hold','sel-done'));el.classList.add(t==='freelance'?'sel-todo':t==='yiyu'?'sel-done':'sel-hold');}
async function saveTimeBlock(){
  const title=document.getElementById('time-title-input').value.trim();
  const start=document.getElementById('time-start').value;
  const end=document.getElementById('time-end').value;
  if(!title||!start||!end||start>=end){alert('일정 이름과 시작/종료 시간을 확인해주세요');return;}
  const result=await db('time_blocks','POST',{id:uid(),title,start_time:start,end_time:end,type:state.timeType,day:state.currentDay});
  if(!result){alert('저장에 실패했어요. 잠시 후 다시 시도해주세요');return;}
  closeModal('modal-time');
  await loadAndRenderTime();
}
async function deleteTimeBlock(id){
  if(!confirm('이 일정을 삭제할까요?'))return;
  await db('time_blocks','DELETE',null,`?id=eq.${id}`);
  loadAndRenderTime();
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-bg').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');});});

loadAndRenderTodos();
renderTime();
loadAndRenderTime();
</script>
